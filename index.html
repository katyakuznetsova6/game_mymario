    /** Простой зацикленный BGM (Web Audio), без файлов */
    const GameMusic = {
      ctx: null,
      gain: null,
      timer: null,
      step: 0,
      playing: false,
      notes: [
        392, 392, 523, 392, 330, 349, 392, 392,
        392, 523, 587, 523, 392, 349, 330, 330,
        294, 294, 349, 392, 440, 392, 349, 349,
        330, 330, 349, 392, 392, 349, 330, 294,
      ],
      init() {
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ctx = new AC();
        this.gain = this.ctx.createGain();
        this.gain.gain.value = 0.08;
        this.gain.connect(this.ctx.destination);
      },
      async resume() {
        this.init();
        if (this.ctx && this.ctx.state === 'suspended') await this.ctx.resume();
      },
      playNote(freq, t, dur) {
        if (!this.ctx) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = 'square';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g);
        g.connect(this.gain);
        o.start(t);
        o.stop(t + dur + 0.02);
      },
      start() {
        if (this.playing) return;
        this.playing = true;
        this.init();
        const beat = 0.18;
        const loop = () => {
          if (!this.ctx || !this.playing) return;
          const t0 = this.ctx.currentTime + 0.05;
          for (let i = 0; i < 4; i++) {
            const f = this.notes[(this.step + i) % this.notes.length];
            this.playNote(f, t0 + i * beat, beat * 0.85);
          }
          this.step = (this.step + 4) % this.notes.length;
        };
        loop();
        this.timer = setInterval(loop, 4 * 0.18 * 1000);
      },
      stop() {
        this.playing = false;
        if (this.timer) clearInterval(this.timer);
        this.timer = null;
      },
    };

    function drawPlumberFrame(g, big, frame) {
      g.clear();
      if (!big) {
        const pw = 26;
        const ph = 34;
        const bob = frame === 1 ? 1 : 0;
        const arm = frame === 1 ? 2 : 0;
        g.fillStyle(0x1e3a8a);
        g.fillRect(5 + bob, 16, 16, 16);
        g.fillStyle(0xfdba74);
        g.fillRect(7 + bob, 10, 12, 10);
        g.fillStyle(0xdc2626);
        g.fillRect(5 + bob, 8, 16, 10);
        g.fillStyle(0x7c2d12);
        g.fillRect(5 + bob, 16, 5, 8);
        g.fillRect(16 + bob, 16, 5, 8);
        if (frame === 1) {
          g.fillStyle(0xfdba74);
          g.fillRect(18 + arm, 14, 6, 4);
        }
        g.generateTexture(frame === 0 ? 'plumber_s' : 'plumber_s2', pw, ph);
      } else {
        const pbw = 30;
        const pbh = 54;
        const bob = frame === 1 ? 2 : 0;
        g.fillStyle(0x1e3a8a);
        g.fillRect(4 + bob, 26, 22, 26);
        g.fillStyle(0xfdba74);
        g.fillRect(7 + bob, 12, 16, 18);
        g.fillStyle(0xdc2626);
        g.fillRect(4 + bob, 10, 22, 14);
        g.fillStyle(0x7c2d12);
        g.fillRect(4 + bob, 28, 6, 12);
        g.fillRect(20 + bob, 28, 6, 12);
        if (frame === 1) {
          g.fillStyle(0xfdba74);
          g.fillRect(22, 20, 8, 5);

        g.generateTexture(frame === 0 ? 'plumber_b' : 'plumber_b2', pbw, pbh);

      /** Горизонтальный «участок пола» под врагом: патруль только между краями платформы */
      computePatrolBounds(rows, tx, ty) {
        const support = (ch) => ch && '#B980-'.includes(ch);
        const rowAt = (ry) => (ry >= 0 && ry < rows.length ? rows[ry] : '');
        let floorY = -1;
        for (let d = 1; d <= 14; d++) {
          const r = rowAt(ty + d);
          if (r && support(r[tx])) {
            floorY = ty + d;
            break;
          }
        }
        const margin = TILE * 0.38;
        const cols = rows[0] ? rows[0].length : 1;
        if (floorY < 0) {
          const r0 = rowAt(ty);
          let l = tx;
          while (l > 0 && r0[l - 1] !== '#' && r0[l - 1] !== 'B') l--;
          let r = tx;
          while (r < cols - 1 && r0[r + 1] !== '#' && r0[r + 1] !== 'B') r++;
          return { min: l * TILE + margin, max: (r + 1) * TILE - margin };
        }
        const rf = rowAt(floorY);
        let l = tx;
        while (l > 0 && support(rf[l - 1])) l--;
        let r = tx;
        while (r < cols - 1 && support(rf[r + 1])) r++;
        return { min: l * TILE + margin, max: (r + 1) * TILE - margin };
      }

      /** Сплошной пол под боссом: ширина арены для погони (ряд ty+1) */
      computeBossArenaBounds(rows, tx, ty) {
        const gy = ty + 1;
        const line = gy >= 0 && gy < rows.length ? rows[gy] : '';
        if (!line) return this.computePatrolBounds(rows, tx, ty);
        const walk = (ch) => ch && '#B980'.includes(ch);
        const cols = line.length;
        let l = tx;
        let r = tx;
        while (l > 0 && walk(line[l - 1])) l--;
        while (r < cols - 1 && walk(line[r + 1])) r++;
        const margin = TILE * 0.4;
        return { min: l * TILE + margin, max: (r + 1) * TILE - margin };
      }

      levelCharAt(tx, ty) {
        if (!this.levelRows || ty < 0 || ty >= this.levelRows.length) return '.';
        const row = this.levelRows[ty];
        if (!row || tx < 0 || tx >= row.length) return '.';
        return row[tx];
      }

      hasSupportAtWorld(wx, wy) {
        const tx = Math.floor(wx / TILE);
        const ty = Math.floor(wy / TILE);
        const ch = this.levelCharAt(tx, ty);
        return '#B980-'.includes(ch);
      }

      /** Зона у шеста по центру спрайта игрока (надёжнее, чем body.center в Arcade) */
      playerInFlagZone(player, pole) {
        if (!player || !player.body || !pole || !pole.active) return false;
        const dx = Math.abs(player.x - pole.x);
        const dy = player.y - pole.y;
        return dx < 120 && dy > -180 && dy < 320;
      }

      onReachFlagOverlap(a, b) {
        const player = a === this.player ? a : b === this.player ? b : null;
        const pole = player === a ? b : a;
        if (!player || !pole || pole === player) return;
        if (this.flagPoles.indexOf(pole) < 0) return;
        this.reachFlag(player, pole);
      }

      parseLevel(rows) {
        const supportAt = (gx, gy) => {
          if (gy < 0 || gy >= rows.length) return false;
          const rr = rows[gy];
          if (!rr || gx < 0 || gx >= rr.length) return false;
          return '#B980-'.includes(rr[gx]);
        };
        for (let ty = 0; ty < rows.length; ty++) {
          const row = rows[ty];
          for (let tx = 0; tx < row.length; tx++) {
            const ch = row[tx];
            const cx = tx * TILE + TILE / 2;
            const cy = ty * TILE + TILE / 2;
            if (ch === 'P') {
              this.spawnX = cx;
              this.spawnY = cy - TILE;
            } else if (ch === '#') {
              this.addSolid(cx, cy, 'tile_ground', 'ground');
            } else if (ch === 'B') {
              this.addSolid(cx, cy, 'tile_brick', 'brick');
            } else if (ch === '?') {
              this.addSolid(cx, cy - TILE, 'tile_q', 'q', { loot: 'coin' });
            } else if (ch === '!') {
              this.addSolid(cx, cy - TILE, 'tile_q', 'q', { loot: 'mushroom' });
            } else if (ch === 'U') {
              this.addSolid(cx, cy - TILE, 'tile_q_super', 'q', { loot: 'super' });
            } else if (ch === 'H') {
              this.addSolid(cx, cy - TILE, 'tile_q_shield', 'q', { loot: 'shield' });
            } else if (ch === '-') {
              const s = this.addSpriteStatic(cx, cy, 'tile_plat');
              s.setData('tileType', 'plat');
              s.body.setSize(TILE - 4, 12);
              s.body.offset.set(2, 18);
            } else if (ch === '9') {
              this.addSpriteStatic(cx, cy, 'tile_pipe');
              this.pipeEntries.push({ tx, ty, cx, cy });
            } else if (ch === '8') {
              this.addSpriteStatic(cx, cy, 'tile_pipe');
              this.pipeExits.push({ tx, ty, cx, cy });
            } else if (ch === 'G') {
              const { min: pMin, max: pMax } = this.computePatrolBounds(rows, tx, ty);
              const e = this.physics.add.sprite(cx, cy, 'goomba');
              e.setBounce(0, 0);
              e.setVelocityX(-this.difficulty.goombaStart);
              e.body.setSize(28, 24);
              e.body.offset.set(1, 2);
              e.setDepth(50);
              e.setData('alive', true);
              e.setData('patrolMin', pMin);
              e.setData('patrolMax', pMax);
              e.setData('patrolDir', -this.difficulty.goombaStart);
              e.play('goomba_walk');
              this.enemies.add(e);
            } else if (ch === 'D') {
              const arena = this.computeBossArenaBounds(rows, tx, ty);
              const boss = this.physics.add.sprite(cx, cy - TILE * 1.4, 'dragon');
              boss.setBounce(0, 0);
              boss.setVelocityX(0);
              boss.body.setAllowGravity(false);
              boss.body.setMaxVelocity(420, 900);
              boss.body.setSize(92, 34);
              boss.body.offset.set(20, 16);
              boss.setDepth(60);
              boss.setScale(2.25, 2.25);
              boss.setData('alive', true);
              boss.setData('boss', true);
              boss.setData('hp', this.difficulty.bossHp);
              boss.setData('arenaMin', arena.min - TILE * 2);
              boss.setData('arenaMax', arena.max + TILE * 2);
              boss.setData('awake', false);
              boss.setData('breathNext', 0);
              boss.setData('jumpNext', 0);
              boss.setData('dashUntil', 0);
              if (this.anims.exists('dragon_fly')) boss.play('dragon_fly');
              this.enemies.add(boss);
            } else if (ch === 'S') {
              const m = this.physics.add.sprite(cx, cy, 'shroom_super');
              m.setDepth(105);
              m.body.setAllowGravity(true);
              m.body.setVelocity(65, -110);
              m.body.setSize(24, 20);
              m.body.offset.set(2, 2);
              m.setCollideWorldBounds(true);
              m.setData('isPowerup', true);
              m.setData('super', true);
              this.mushrooms.add(m);
              this.tweens.add({
                targets: m,
                alpha: { from: 1, to: 0.25 },
                duration: 210,
                yoyo: true,
                repeat: -1,
              });
            } else if (ch === 'C') {
              const z = this.add.rectangle(cx, cy, TILE * 2.4, TILE * 1.1, 0x000000, 0);
              z.setVisible(false);
              this.physics.add.existing(z, true);
              if (z.body) z.body.updateFromGameObject();
              this.checkpointZones.add(z);
            } else if (ch === 'o') {
              let coinY = cy;
              for (let d = 1; d <= 10; d++) {
                if (supportAt(tx, ty + d)) {
                  const supportCy = (ty + d) * TILE + TILE / 2;
                  coinY = supportCy - TILE * 0.82;
                  break;
                }
              }
              const c = this.add.sprite(cx, coinY, 'coin');
              this.physics.add.existing(c, true);
              c.body.setCircle(11, -1, -1);
              if (typeof c.body.updateFromGameObject === 'function') c.body.updateFromGameObject();
              c.setDepth(150);
              c.play('coin_spin');
              this.coins.add(c);
            } else if (ch === 'F') {
              const pole = this.add.sprite(cx, cy + TILE * 2, 'flagpole');
              /* Текстура 80×160: шест смещён влево от центра — origin по шесту, без «разъезда» с флагом */
              pole.setOrigin(34 / 80, 0);
              pole.setDepth(45);
              this.physics.add.existing(pole, true);
              pole.body.setSize(16, 152);
              pole.body.offset.set(26, 4);
              if (typeof pole.refreshBody === 'function') pole.refreshBody();
              this.flags.add(pole);
              this.flagPoles.push(pole);
            } else if (ch === '|') {
              /* Декор '|' отключён: он визуально дробил шест флага */
            }
          }
        }
      }

      addSpriteStatic(cx, cy, key) {
        const s = this.add.sprite(cx, cy, key);
        this.physics.add.existing(s, true);
        this.solids.add(s);
        return s;
      }

      addSolid(cx, cy, key, type, extra) {
        const s = this.addSpriteStatic(cx, cy, key);
        s.setData('tileType', type);
        if (extra && extra.loot) s.setData('loot', extra.loot);
        s.setData('used', false);
        this.bumpables.push(s);
        return s;
      }

      /** Удар снизу в блок: у высокого тела Arcade иногда не выставляет touching.up — доп. геометрия */
      bumpBlockFromBelow(player, block) {
        if (player.body.touching.up || player.body.blocked.up) return true;
        if (player.body.velocity.y >= -40) return false;
        const bBottom = block.body.bottom;
        const top = player.body.top;
        if (top > bBottom + 10 || top < bBottom - 28) return false;
        const dx = Math.abs(player.body.center.x - block.body.center.x);
        return dx < TILE * 0.72;
      }

      onPlayerSolid(player, block) {
        if (!block.getData) return;
        const t = block.getData('tileType');
        const bumpFromBelow = this.bumpBlockFromBelow(player, block);
        if (bumpFromBelow) {
          if (t === 'q' && !block.getData('used')) {
            this.hitQuestion(block);
          } else if (t === 'brick' && player.getData('big')) {
            this.breakBrick(block);
          }
        }
      }

      grantCoins(amount) {
        let c = this.registry.get('coins') + amount;
        while (c >= 100) {
          c -= 100;
          this.registry.set('tries', this.registry.get('tries') + 1);
          this.beep(523, 0.1);
          this.time.delayedCall(80, () => this.beep(659, 0.12));
        }
        this.registry.set('coins', c);
      }

      hitQuestion(block) {
        block.setData('used', true);
        block.setTexture('tile_empty');
        const loot = block.getData('loot') || 'coin';
        if (loot === 'coin') {
          this.spawnCoinPop(block.x, block.y - TILE);
          this.grantCoins(1);
          this.beep(520, 0.06);
        } else if (loot === 'mushroom') {
          this.spawnPowerup(block.x, block.y - TILE * 1.6, 'shroom');
          this.beep(380, 0.08);
        } else if (loot === 'super') {
          this.spawnPowerup(block.x, block.y - TILE * 1.6, 'shroom_super', { super: true });
          this.beep(760, 0.1);
        } else if (loot === 'shield') {
          this.spawnPowerup(block.x, block.y - TILE * 1.6, 'shroom_shield', { shield: true });
          this.beep(380, 0.08);
        }
      }

      spawnPowerup(x, y, key, extra) {
        const m = this.physics.add.sprite(x, y, key);
        m.setDepth(100);
        m.body.setAllowGravity(true);
        m.body.setVelocity(100, -120);
        m.body.setSize(24, 20);
        m.body.offset.set(2, 2);
        m.body.setImmovable(false);
        m.setPushable(false);
        m.setCollideWorldBounds(true);
        m.setData('isPowerup', true);
        if (extra && extra.super) m.setData('super', true);
        if (extra && extra.shield) m.setData('shield', true);
        this.mushrooms.add(m);
      }

      breakBrick(block) {
        this.tweens.add({
          targets: block,
          alpha: 0,
          y: block.y + 8,
          duration: 120,
          onComplete: () => {
            this.solids.remove(block, true, true);
            const i = this.bumpables.indexOf(block);
            if (i >= 0) this.bumpables.splice(i, 1);
          },
        });
        this.beep(180, 0.05);
      }

      spawnCoinPop(x, y) {
        const star = this.add.sprite(x, y, 'coin');
        star.setDepth(500);
        star.play('coin_spin');
        this.tweens.add({
          targets: star,
          y: y - 40,
          alpha: 0,
          duration: 400,
          onComplete: () => star.destroy(),
        });
      }

      collectCoin(a, b) {
        const isCoin = (o) => o && (o.texture?.key === 'coin' || o.texture?.key === 'coin2');
        const coin = isCoin(a) ? a : isCoin(b) ? b : null;
        const player = a === this.player ? a : b === this.player ? b : null;
        if (!coin || !coin.active || player !== this.player) return;
        if (coin.getData && coin.getData('collected')) return;
        if (coin.setData) coin.setData('collected', true);
        if (this.coins && this.coins.contains && this.coins.contains(coin)) {
          this.coins.remove(coin, false, false);
        }
        if (coin.body) coin.body.enable = false;
        this.grantCoins(1);
        this.beep(660, 0.05);
        coin.setDepth(500);
        this.tweens.add({
          targets: coin,
          y: coin.y - 26,
          scaleX: 1.45,
          scaleY: 1.45,
          alpha: 0,
          duration: 220,
          ease: 'Sine.Out',
          onComplete: () => {
            if (coin.active) coin.destroy();
          },
        });
      }

      collectMushroom(a, b) {
        const isMush = (o) =>
          o && (o.texture?.key === 'shroom' || o.texture?.key === 'shroom_super' || o.texture?.key === 'shroom_shield');
        const shroom = isMush(a) ? a : isMush(b) ? b : null;
        const player = shroom === a ? b : a;
        if (!shroom || !shroom.active || player !== this.player) return;
        const superBoost = shroom.texture?.key === 'shroom_super' || !!shroom.getData('super');
        const shieldBoost = shroom.texture?.key === 'shroom_shield' || !!shroom.getData('shield');
        shroom.disableBody(true, true);
        /* Не враг: лёгкий отскок как при пауэрапе, не «топот» */
        if (player.body.velocity.y > 80) {
          player.setVelocityY(-120);
        }
        if (!player.getData('big')) {
          this.applyPlayerSize(true);
          player.setScale(1, 1);
          player.stop();
          if (this.anims.exists('p_big_idle')) player.play('p_big_idle');
          else player.setTexture('plumber_b');
          this.tweens.add({
            targets: player,
            scaleY: { from: 0.75, to: 1.12 },
            duration: 200,
            yoyo: true,
            onComplete: () => {
              player.setScale(1, 1);
              if (this.anims.exists('p_big_idle')) player.play('p_big_idle');
            },
          });
        }
        this.registry.set('playerBig', true);
        if (superBoost) {
          this.invulnUntil = Math.max(this.invulnUntil, this.time.now + 10000);
          player.setTint(0xe879f9);
          this.time.delayedCall(10000, () => {
            if (player.active && this.time.now >= this.invulnUntil) player.clearTint();
          });
          this.beep(760, 0.18);
        } else if (shieldBoost) {
          player.setData('shield', true);
          this.registry.set('playerShield', true);
          this.beep(820, 0.12);
        } else if (player.clearTint) {
          player.clearTint();
        }
        this.beep(440, 0.15);
      }

      hitEnemy(a, b) {
        if (a.texture?.key === 'shroom' || b.texture?.key === 'shroom') return;
        const isGoomba = (o) =>
          o &&
          (o.texture?.key === 'goomba' ||
            o.texture?.key === 'goomba2' ||
            (o.anims && o.anims.currentFrame && ['goomba', 'goomba2'].includes(o.anims.currentFrame.texture.key)));
        let enemy = this.enemies.contains(a) ? a : this.enemies.contains(b) ? b : null;
        if (!enemy) enemy = isGoomba(a) ? a : isGoomba(b) ? b : null;
        const player = enemy === a ? b : a;
        if (!enemy || player !== this.player) return;
        if (!enemy.getData('alive')) return;
        if (this.time.now < this.invulnUntil) return;
        const boss = enemy.getData('boss');
        const stompTop = boss ? 44 : 22;
        const stomp =
          player.body.velocity.y > 15 && player.body.bottom <= enemy.body.top + stompTop;
        if (stomp) {
          if (boss) {
            let hp = enemy.getData('hp') - 1;
            enemy.setData('hp', hp);
            player.setVelocityY(-240);
            const kickDir = player.x >= enemy.x ? -1 : 1;
            enemy.body.setVelocity(kickDir * 240, -95);
            enemy.setData('knockUntil', this.time.now + 180);
            enemy.setData('dashUntil', this.time.now + 420);
            this.beep(120 + hp * 50, 0.1);
            if (hp <= 0) {
              enemy.setData('alive', false);
              enemy.body.setVelocity(0, 0);
              enemy.body.enable = false;
              this.tweens.add({
                targets: enemy,
                scaleY: 0.1,
                alpha: 0,
                y: enemy.y + 20,
                duration: 400,
                onComplete: () => {
                  enemy.disableBody(true, true);
                },
              });
              this.beep(80, 0.25);
            } else {
              enemy.setTint(0xff6666);
              this.time.delayedCall(120, () => enemy.clearTint());
            }
            return;
          }
          enemy.setData('alive', false);
          enemy.body.setVelocity(0, 0);
          enemy.body.enable = false;
          this.tweens.add({
            targets: enemy,
            scaleY: 0.15,
            y: enemy.y + 6,
            duration: 140,
            onComplete: () => {
              enemy.disableBody(true, true);
            },
          });
          player.setVelocityY(-280);
          this.beep(180, 0.09);
        } else {
          this.hurtPlayer();
        }
      }

      hurtPlayer() {
        if (this.time.now < this.invulnUntil) return;
        const p = this.player;
        if (p.getData('shield')) {
          p.setData('shield', false);
          this.registry.set('playerShield', false);
          this.invulnUntil = this.time.now + 900;
          this.flashPlayer();
          this.beep(920, 0.12);
          return;
        }
        if (p.getData('big')) {
          p.setData('big', false);
          this.registry.set('playerBig', false);
          this.applyPlayerSize(false);
          p.play('p_small_idle');
          this.invulnUntil = this.time.now + 1800;
          this.flashPlayer();
          this.beep(140, 0.15);
          return;
        }
        let tries = this.registry.get('tries') - 1;
        this.registry.set('tries', tries);
        this.registry.set('playerBig', false);
        this.registry.set('playerShield', false);
        this.beep(90, 0.2);
        if (tries <= 0) {
          this.showGameOver();
        } else {
          this.scene.restart();
        }
      }

      flashPlayer() {
        this.tweens.add({
          targets: this.player,
          alpha: 0.3,
          duration: 100,
          yoyo: true,
          repeat: 5,
          onComplete: () => {
            this.player.setAlpha(1);
          },
        });
      }

      touchCheckpoint(a, b) {
        const pl = a === this.player ? a : b === this.player ? b : null;
        const zone = pl === a ? b : a;
        if (!pl || !zone || zone === this.player) return;
        this.registry.set('checkpointLevel', this.levelIndex);
        this.registry.set('checkpointX', zone.x);
        this.registry.set('checkpointY', zone.y - TILE);
      }

      isFinalBossAlive() {
        if (this.levelIndex !== LEVELS.length - 1) return false;
        let alive = false;
        this.enemies.children.iterate((e) => {
          if (!e || !e.active || !e.getData) return;
          if (e.getData('boss') && e.getData('alive')) alive = true;
        });
        return alive;
      }

      shootFireball() {
        if (!this.player || !this.player.active || this.isFrozen) return;
        if (this.levelIndex !== LEVELS.length - 1) return;
        if (this.levelDone && this._flagNextLevel != null) return;
        if (this.time.now < this.nextFireAt) return;
        this.nextFireAt = this.time.now + 220;
        const p = this.player;
        const dir = p.flipX ? -1 : 1;
        const fb = this.physics.add.sprite(p.x + dir * 30, p.y - 24, 'fireball');
        fb.setDepth(95);
        fb.body.setAllowGravity(false);
        fb.body.setCircle(7, 1, 1);
        let vx = dir * 980;
        let vy = 0;
        let nearestBoss = null;
        let nearestDist = Infinity;
        this.enemies.children.iterate((e) => {
          if (!e || !e.active || !e.getData || !e.getData('alive') || !e.getData('boss')) return;
          const d = Phaser.Math.Distance.Between(p.x, p.y, e.x, e.y);
          if (d < nearestDist) {
            nearestDist = d;
            nearestBoss = e;
          }
        });
        if (nearestBoss) {
          const dx = nearestBoss.x - fb.x;
          const dy = nearestBoss.y - fb.y;
          const n = Math.max(1, Math.hypot(dx, dy));
          const speed = 1020;
          vx = (dx / n) * speed;
          vy = (dy / n) * speed;
        }
        fb.body.setVelocity(vx, vy);
        fb.setData('shotAt', this.time.now);
        this.fireballs.add(fb);
        this.beep(690, 0.04);
      }

      onEnemyFireHitSolid(a, b) {
        const fb =
          a && a.texture?.key === 'enemy_fire'
            ? a
            : b && b.texture?.key === 'enemy_fire'
              ? b
              : null;
        if (fb && fb.active) fb.destroy();
      }

      onEnemyFireHitPlayer(a, b) {
        const fb = a === this.player ? b : b === this.player ? a : null;
        if (!fb || !fb.active || fb.texture?.key !== 'enemy_fire') return;
        fb.destroy();
        if (this.isFrozen || this.levelDone) return;
        if (this.time.now < this.invulnUntil) return;
        this.hurtPlayer();
      }

      onFireballHitEnemy(a, b) {
        const fb =
          a && a.texture && a.texture.key === 'fireball'
            ? a
            : b && b.texture && b.texture.key === 'fireball'
              ? b
              : null;
        const enemy = fb === a ? b : a;
        if (!fb || !fb.active || !enemy || !enemy.active) return;
        if (!enemy.getData || !enemy.getData('alive')) return;
        fb.destroy();
        if (enemy.getData('boss')) {
          if (this.time.now < (enemy.getData('fireIframes') || 0)) return;
          enemy.setData('fireIframes', this.time.now + 260);
          let hp = enemy.getData('hp') - 1;
          enemy.setData('hp', hp);
          enemy.setTint(0xff3333);
          const kickDir = fb.x <= enemy.x ? 1 : -1;
          enemy.body.setVelocity(kickDir * 280, -90);
          enemy.setData('knockUntil', this.time.now + 180);
          enemy.setData('dashUntil', this.time.now + 520);
          this.time.delayedCall(90, () => {
            if (enemy.active) enemy.clearTint();
          });
          this.beep(160, 0.07);
          if (hp <= 0) {
            enemy.setData('alive', false);
            enemy.body.setVelocity(0, 0);
            enemy.body.enable = false;
            this.tweens.add({
              targets: enemy,
              scaleY: 0.08,
              alpha: 0,
              y: enemy.y + 24,
              duration: 450,
              onComplete: () => {
                if (enemy.disableBody) enemy.disableBody(true, true);
              },
            });
            this.beep(65, 0.28);
          }
          return;
        }
        enemy.setData('alive', false);
        enemy.body.setVelocity(0, 0);
        enemy.body.enable = false;
        this.tweens.add({
          targets: enemy,
          scaleY: 0.12,
          y: enemy.y + 8,
          duration: 100,
          onComplete: () => {
            if (enemy.disableBody) enemy.disableBody(true, true);
          },
        });
        this.beep(210, 0.05);
      }

      tryPipeWarp() {
        if (this.pipeWarping || this.time.now < this.pipeCooldownUntil) return;
        if (!this.cursors.down.isDown && !this.keyS.isDown) return;
        const p = this.player;
        const onGround = p.body.blocked.down || p.body.touching.down;
        if (!onGround) return;
        for (const link of this.pipeLinks) {
          const pipeTop = link.cy - TILE / 2;
          const onPipeTop = Math.abs(p.body.bottom - pipeTop) < 12 && Math.abs(p.x - link.cx) < TILE * 0.55;
          if (onPipeTop) {
            this.pipeWarping = true;
            this.physics.pause();
            p.setVelocity(0, 0);
            if (p.anims) p.stop();
            const big = !!p.getData('big');
            const sx0 = 1;
            const sy0 = 1;
            const finishWarp = () => {
              /* Чуть вправо от центра трубы + короткая неуязвимость — иначе гумба у выхода */
              p.setPosition(link.targetX + TILE * 0.42, link.targetY);
              p.setAlpha(1);
              p.setScale(sx0, sy0);
              this.physics.resume();
              this.pipeWarping = false;
              this.pipeCooldownUntil = this.time.now + 700;
              this.invulnUntil = Math.max(this.invulnUntil, this.time.now + 1650);
              this.beep(200, 0.1);
              if (big) {
                if (this.anims.exists('p_big_idle')) p.play('p_big_idle');
                else p.setTexture('plumber_b');
              } else if (this.anims.exists('p_small_idle')) p.play('p_small_idle');
            };
            this.tweens.add({
              targets: p,
              scaleX: big ? 1.06 : 1.08,
              scaleY: big ? 0.58 : 0.54,
              y: p.y + 6,
              duration: 150,
              ease: 'Sine.in',
              onComplete: () => {
                this.tweens.add({
                  targets: p,
                  y: p.y + 26,
                  alpha: 0.35,
                  scaleX: 0.92,
                  scaleY: 0.42,
                  duration: 300,
                  ease: 'Sine.in',
                  onComplete: finishWarp,
                });
              },
            });
            return;
          }
        }
      }

      reachFlag(player, pole) {
        if (!pole || player !== this.player) return;
        if (this.levelDone || this.isFrozen) return;
        if (this.isFinalBossAlive()) {
          this.beep(130, 0.09);
          if (this.levelTransitionText) {
            this.levelTransitionText.setText('Сначала победи дракона!');
            this.levelTransitionText.setVisible(true);
            this.levelTransitionText.setAlpha(1);
            this.levelTransitionText.setDepth(4000);
            this.time.delayedCall(900, () => {
              if (this.levelTransitionText && !this.levelDone) this.levelTransitionText.setVisible(false);
            });
          }
          return;
        }
        this.levelDone = true;
        /* disableBody есть у physics.add.sprite, но не у add.sprite + add.existing(static) */
        if (pole.body) pole.body.enable = false;

        const next = this.levelIndex + 1;
        if (next >= LEVELS.length) {
          this.winText.setText('Победа!\nВсе уровни пройдены\nR / Enter — заново');
          this.winText.setVisible(true);
          this.isFrozen = true;
          this.physics.pause();
          GameMusic.stop();
          this.registry.set('checkpointLevel', -1);
          this.registry.set('level', 0);
        } else {
          this._flagNextLevel = next;
          this.player.setVelocity(0, 0);
          /* Не ставим physics.pause() — у части окружений сцена/таймеры ведут себя нестабильно; врагов гасим в update */
          this.beep(523, 0.12);
          setTimeout(() => {
            try {
              this.beep(659, 0.12);
            } catch (_) {}
          }, 80);
          const doneNum = this.levelIndex + 1;
          const nextNum = next + 1;
          this.levelTransitionText.setText(
            `Уровень ${doneNum} пройден!\nУровень ${nextNum} — загрузка…\n(R / Enter / клик — не ждать)`,
          );
          this.levelTransitionText.setVisible(true);
          this.levelTransitionText.setAlpha(1);
          this.levelTransitionText.setDepth(4000);
          if (this.levelTransitionTimer) {
            this.levelTransitionTimer.remove(false);
            this.levelTransitionTimer = null;
          }
          if (this._advanceTimeoutId != null) {
            clearTimeout(this._advanceTimeoutId);
            this._advanceTimeoutId = null;
          }
          /* delayedCall иногда не срабатывает при physics.pause — setTimeout не зависит от часов сцены */
          const self = this;
          const targetLevel = next;
          const goNext = () => {
            self._advanceTimeoutId = null;
            try {
              if (self.levelTransitionText) self.levelTransitionText.setVisible(false);
              self.registry.set('checkpointLevel', -1);
              self.registry.set('level', targetLevel);
              self._flagNextLevel = null;
              self.levelDone = false;
              self.physics.resume();
              self.scene.restart();
            } catch (err) {
              try {
                self.physics.resume();
                self.levelDone = false;
                self._flagNextLevel = targetLevel;
              } catch (_) {}
              console.error(err);
            }
          };
          this._advanceTimeoutId = setTimeout(goNext, 900);
        }
      }

      showGameOver() {
        this.registry.set('playerBig', false);
        this.registry.set('playerShield', false);
        this.registry.set('checkpointLevel', -1);
        this.gameOverText.setText('Игра окончена\nR / Enter — новая игра');
        this.gameOverText.setVisible(true);
        this.isFrozen = true;
        this.physics.pause();
        GameMusic.stop();
      }

      resetFullGame() {
        this.registry.set('level', 0);
        this.registry.set('coins', 0);
        this.registry.set('tries', 3);
        this.registry.set('playerBig', false);
        this.registry.set('playerShield', false);
        this.registry.set('checkpointLevel', -1);
        this.gameOverText.setVisible(false);
        this.winText.setVisible(false);
        if (this.levelTransitionTimer) {
          this.levelTransitionTimer.remove(false);
          this.levelTransitionTimer = null;
        }
        if (this._advanceTimeoutId != null) {
          clearTimeout(this._advanceTimeoutId);
          this._advanceTimeoutId = null;
        }
        if (this.levelTransitionText) this.levelTransitionText.setVisible(false);
        this._flagNextLevel = null;
        this.isFrozen = false;
        this.physics.resume();
        GameMusic.stop();
        GameMusic.playing = false;
        this.scene.restart();
      }

      beep(freq, dur) {
        try {
          const ctx = GameMusic.ctx || new (window.AudioContext || window.webkitAudioContext)();
          if (!GameMusic.ctx) GameMusic.ctx = ctx;
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.frequency.value = freq;
          o.type = 'square';
          g.gain.setValueAtTime(0.05, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
          o.start();
          o.stop(ctx.currentTime + dur);
        } catch (_) {}
      }

      update(time) {
        if (this.pendingRestartKey) {
          this.pendingRestartKey = false;
          if (this.gameOverText.visible || this.winText.visible) {
            this.resetFullGame();
          } else if (this._flagNextLevel != null) {
            if (this.levelTransitionTimer) {
              this.levelTransitionTimer.remove(false);
              this.levelTransitionTimer = null;
            }
            if (this._advanceTimeoutId != null) {
              clearTimeout(this._advanceTimeoutId);
              this._advanceTimeoutId = null;
            }
            this.levelTransitionText.setVisible(false);
            this.registry.set('checkpointLevel', -1);
            this.registry.set('level', this._flagNextLevel);
            this._flagNextLevel = null;
            this.levelDone = false;
            this.isFrozen = false;
            this.physics.resume();
            this.scene.restart();
          } else {
            this.registry.set('level', this.levelIndex);
            this.scene.restart();
          }
          return;
        }

        if (this.isFrozen) return;

        const p = this.player;

        /* Уровень пройден, ждём таймер / R: герой стоит, враги не трогаем (мир на паузе) */
        if (this.levelDone && this._flagNextLevel != null) {
          if (p && p.body) p.setVelocity(0, 0);
          this.enemies.children.iterate((e) => {
            if (e && e.active && e.body) e.setVelocity(0, 0);
          });
          this.mushrooms.children.iterate((m) => {
            if (m && m.active && m.body) m.setVelocity(0, 0);
          });
          this.hud.setText(
            `Монеты: ${this.registry.get('coins')}   Попытки: ${this.registry.get('tries')}   Щит: ${this.player.getData('shield') ? 'да' : 'нет'}   Сложность: ${this.difficulty.label}\nУровень: ${this.levelIndex + 1} / ${LEVELS.length}`,
          );
          return;
        }

        const moved =
          this.cursors.left.isDown ||
          this.cursors.right.isDown ||
          this.cursors.down.isDown ||
          this.keyA.isDown ||
          this.keyD.isDown ||
          this.keyS.isDown ||
          this.spaceKey.isDown ||
          this.keyW.isDown;
        if (moved && !this.bgmStarted) {
          this.bgmStarted = true;
          GameMusic.resume().then(() => GameMusic.start());
        }

        if (this.pipeWarping) return;

        const onGround = p.body.blocked.down || p.body.touching.down;
        if (onGround) this.lastOnGround = time;

        if (this.cursors.left.isDown || this.keyA.isDown) {
          p.setVelocityX(-MOVE_SPEED);
          p.setFlipX(true);
        } else if (this.cursors.right.isDown || this.keyD.isDown) {
          p.setVelocityX(MOVE_SPEED);
          p.setFlipX(false);
        } else {
          p.setVelocityX(0);
        }

        const jumpPressed =
          Phaser.Input.Keyboard.JustDown(this.spaceKey) || Phaser.Input.Keyboard.JustDown(this.keyW);
        if (jumpPressed) {
          this.jumpBuffered = time;
        }
        const fireNow = this.pendingFireKey || Phaser.Input.Keyboard.JustDown(this.keyX);
        this.pendingFireKey = false;
        if (fireNow) {
          this.shootFireball();
        }
        /* Явный прыжок с места: если стоим, но нажали прыжок, не ждём буфер */
        const standingStill = Math.abs(p.body.velocity.x) < 1;
        const jv = p.getData('big') ? JUMP_VEL_BIG : JUMP_VEL;
        if (jumpPressed && onGround && standingStill) {
          p.setVelocityY(jv);
          this.jumpBuffered = 0;
          this.lastOnGround = 0;
        }
        const coyoteOk = time - this.lastOnGround < COYOTE_MS;
        const bufferOk = time - this.jumpBuffered < JUMP_BUFFER_MS;
        if ((onGround || coyoteOk) && bufferOk) {
          p.setVelocityY(jv);
          this.jumpBuffered = 0;
          this.lastOnGround = 0;
        }

        const big = p.getData('big');
        if (!onGround) {
          p.anims.play(big ? 'p_big_jump' : 'p_small_jump', true);
        } else if (Math.abs(p.body.velocity.x) > 15) {
          p.anims.play(big ? 'p_big_run' : 'p_small_run', true);
        } else {
          p.anims.play(big ? 'p_big_idle' : 'p_small_idle', true);
        }

        this.tryPipeWarp();

        if (!this.levelDone && !this.isFrozen && this.flagPoles.length) {
          for (let fi = 0; fi < this.flagPoles.length; fi++) {
            const pole = this.flagPoles[fi];
            if (!pole || !pole.active) continue;
            if (this.playerInFlagZone(p, pole)) {
              this.reachFlag(p, pole);
              break;
            }
          }
        }

        /* Яма: всегда смерть уровня (не блокируется неуязвимостью после гриба) */
        if (p.y > this.worldH + 24 && !this.pitDeathLock) {
          this.pitDeathLock = true;
          this.registry.set('playerBig', false);
          this.registry.set('playerShield', false);
          let tries = this.registry.get('tries') - 1;
          this.registry.set('tries', tries);
          this.beep(90, 0.2);
          if (tries <= 0) {
            this.showGameOver();
          } else {
            this.scene.restart();
          }
        }

        const patrolSpeed = this.difficulty.patrolSpeed;
        const bossChase = this.difficulty.bossChase;

        this.enemies.children.iterate((e) => {
          if (!e || !e.active || !e.body) return;
          if (!e.getData('alive') || !e.getData('boss')) return;
          const b = e.body;
          const aMin = e.getData('arenaMin');
          const aMax = e.getData('arenaMax');
          const awake = !!e.getData('awake');
          if (this.isFrozen || this.levelDone || !p || !p.active) {
            b.setVelocity(0, 0);
            return;
          }
          if (!awake) {
            const view = this.cameras.main.worldView;
            const exL = e.x - b.width * 0.55;
            const exR = e.x + b.width * 0.55;
            const inView = exR >= view.x && exL <= view.right;
            if (inView) {
              e.setData('awake', true);
              e.setData('breathNext', time + 700 * this.difficulty.bossBreathPauseMul);
            } else {
              b.setVelocity(0, 0);
              return;
            }
          }
          const knockUntil = e.getData('knockUntil') || 0;
          if (time < knockUntil) {
            e.setFlipX(p.x < e.x - 2);
            return;
          }
          const dx = p.x - e.x;
          let vx = 0;
          let vy = 0;
          const dashUntil = e.getData('dashUntil') || 0;
          if (time < dashUntil) {
            const d = dx >= 0 ? 1 : -1;
            vx = d * (bossChase + 90);
          } else {
            if (Math.abs(dx) > 36) vx = dx > 0 ? bossChase : -bossChase;
            if (Math.abs(dx) < 150 && Math.random() < 0.009) e.setData('dashUntil', time + 540);
            if (Math.abs(dx) < 70 && Math.random() < 0.02) vx = dx > 0 ? -90 : 90;
          }
          const hoverY = Phaser.Math.Clamp(p.y - 18, TILE * 2.5, this.worldH - TILE * 3.2);
          const dy = hoverY - e.y;
          if (Math.abs(dy) > 8) vy = Phaser.Math.Clamp(dy * 2.2, -190, 190);
          const jumpNext = e.getData('jumpNext') || 0;
          if (time >= jumpNext && Math.random() < 0.02) {
            vy -= 110 + Math.random() * 80;
            e.setData('jumpNext', time + 900 + Math.random() * 800);
          }
          if (aMin != null && aMax != null) {
            if (e.x <= aMin + 10) vx = bossChase;
            else if (e.x >= aMax - 10) vx = -bossChase;
          }
          if (e.body.blocked.left) vx = Math.abs(bossChase);
          if (e.body.blocked.right) vx = -Math.abs(bossChase);
          b.setVelocity(vx, vy);
          e.setFlipX(p.x < e.x - 2);
        });

        this.enemies.children.iterate((e) => {
          if (!e || !e.active || !e.body) return;
          if (!e.getData('alive')) return;
          if (e.getData('boss')) return;
          const b = e.body;
          const pMin = e.getData('patrolMin');
          const pMax = e.getData('patrolMax');
          const spd = patrolSpeed;
          if (pMin != null && pMax != null && pMax > pMin + 2) {
            let vx = b.velocity.x;
            if (Math.abs(vx) < 8) vx = e.getData('patrolDir') ?? spd;
            if (b.blocked.left && vx < 0) {
              vx = spd;
              e.setData('patrolDir', spd);
            }
            if (b.blocked.right && vx > 0) {
              vx = -spd;
              e.setData('patrolDir', -spd);
            }
            if (e.x <= pMin + 2 && vx < 0) {
              vx = spd;
              e.setData('patrolDir', spd);
            }
            if (e.x >= pMax - 2 && vx > 0) {
              vx = -spd;
              e.setData('patrolDir', -spd);
            }
            if (b.blocked.down || b.touching.down) {
              const aheadX = e.x + Math.sign(vx || e.getData('patrolDir') || spd) * (b.width * 0.55 + 6);
              const aheadY = b.bottom + 5;
              if (!this.hasSupportAtWorld(aheadX, aheadY)) {
                vx = vx >= 0 ? -spd : spd;
                e.setData('patrolDir', vx);
              }
            }
            b.setVelocityX(vx);
            e.setFlipX(vx < 0);
          } else {
            let vx = b.velocity.x;
            if (b.blocked.left) {
              vx = spd;
              e.setData('patrolDir', spd);
            } else if (b.blocked.right) {
              vx = -spd;
              e.setData('patrolDir', -spd);
            } else if ((b.blocked.down || b.touching.down) && Math.abs(vx) < 8) {
              vx = e.getData('patrolDir') ?? spd;
              e.setData('patrolDir', vx);
            }
            if (b.blocked.down || b.touching.down) {
              const aheadX = e.x + Math.sign(vx || e.getData('patrolDir') || spd) * (b.width * 0.55 + 6);
              const aheadY = b.bottom + 5;
              if (!this.hasSupportAtWorld(aheadX, aheadY)) {
                vx = vx >= 0 ? -spd : spd;
                e.setData('patrolDir', vx);
              }
            }
            b.setVelocityX(vx);
            e.setFlipX(b.velocity.x < 0);
          }
        });

        this.fireballs.children.iterate((f) => {
          if (!f || !f.active) return;
          const t = f.getData('shotAt') || 0;
          if (this.time.now - t > 3600 || f.x < -120 || f.x > this.worldW + 120) {
            f.destroy();
            return;
          }
          if (this.levelIndex !== LEVELS.length - 1) return;
          let target = null;
          let best = Infinity;
          this.enemies.children.iterate((e) => {
            if (!e || !e.active || !e.getData || !e.getData('alive') || !e.getData('boss')) return;
            const d = Phaser.Math.Distance.Squared(f.x, f.y, e.x, e.y);
            if (d < best) {
              best = d;
              target = e;
            }
          });
          if (target) {
            const speed = 1040;
            const dx = target.x - f.x;
            const dy = target.y - f.y;
            const len = Math.max(8, Math.hypot(dx, dy));
            f.body.setVelocity((dx / len) * speed, (dy / len) * speed);
          }
        });

        this.enemies.children.iterate((e) => {
          if (!e || !e.active || !e.body) return;
          if (!e.getData('alive') || !e.getData('boss')) return;
          if (!e.getData('awake')) return;
          const pl = this.player;
          if (!pl || !pl.active || this.isFrozen || this.levelDone) return;
          if (this.time.now < (e.getData('breathNext') || 0)) return;
          const dx = pl.x - e.x;
          const dy = pl.y - e.y;
          if (Math.abs(dx) > 400 || Math.abs(dy) > 150) {
            e.setData('breathNext', this.time.now + 500 + Math.random() * 400);
            return;
          }
          /* Иногда плюёт: не каждый тик — случайный пропуск и длинная пауза после залпа */
          if (Math.random() > this.difficulty.bossBreathSkipChance) {
            e.setData(
              'breathNext',
              this.time.now + (350 + Math.random() * 450) * this.difficulty.bossBreathPauseMul,
            );
            return;
          }
          e.setData(
            'breathNext',
            this.time.now + (2400 + Math.random() * 2200) * this.difficulty.bossBreathPauseMul,
          );
          const dir = pl.x >= e.x ? 1 : -1;
          const bursts = 1 + (Math.random() < 0.4 ? 1 : 0);
          for (let i = 0; i < bursts; i++) {
            this.time.delayedCall(i * 120, () => {
              if (!e.active || !e.getData('alive')) return;
              const mouth = dir > 0 ? 48 : -48;
              const shot = this.physics.add.sprite(e.x + mouth, e.y - 14, 'enemy_fire');
              shot.setDepth(92);
              shot.body.setAllowGravity(false);
              shot.body.setCircle(7, 1, 1);
              shot.body.setVelocityX(dir * (300 + Math.random() * 55));
              shot.body.setVelocityY(Phaser.Math.Clamp(dy * 0.22, -55, 55) + (i - 0.5) * 16);
              this.enemyFireballs.add(shot);
              this.beep(200 + i * 28, 0.05);
            });
          }
        });

        this.hud.setText(
          `Монеты: ${this.registry.get('coins')}   Попытки: ${this.registry.get('tries')}   Щит: ${this.player.getData('shield') ? 'да' : 'нет'}   Сложность: ${this.difficulty.label}\nУровень: ${this.levelIndex + 1} / ${LEVELS.length}`,
        );
      }
    }

    const config = {
      type: Phaser.AUTO,
      parent: document.body,
      width: VIEW_W,
      height: VIEW_H,
      backgroundColor: SKY,
      input: {
        keyboard: true,
        activePointers: 3,
      },
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: GRAVITY_Y }, debug: false },
      },
      scene: [BootScene, GameScene],
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
      callbacks: {
        postBoot: (game) => {
          const c = game.canvas;
          if (!c) return;
          c.setAttribute('tabindex', '0');
          c.style.outline = 'none';
          const focus = () => {
            try {
              c.focus({ preventScroll: true });
            } catch (_) {
              c.focus();
            }
          };
          focus();
          c.addEventListener('mousedown', focus);
          c.addEventListener('touchstart', focus, { passive: true });
        },
      },
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
